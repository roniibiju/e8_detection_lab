<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}E8 Detection Lab{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="main-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <span class="brand-icon"><i class="bi bi-shield-shaded"></i></span>
      <span class="brand-text">E8 Detection Lab</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'rules_list' %}active{% endif %}" href="/rules">
            <i class="bi bi-list-ul"></i> Rules
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'mapping' %}active{% endif %}" href="/mapping">
            <i class="bi bi-diagram-3"></i> Mapping
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="/about/">
            <i class="bi bi-person-circle"></i> About
          </a>
        </li>
        <li class="nav-item ms-2">
          <a class="nav-link text-muted small" href="https://github.com/SigmaHQ/sigma" target="_blank">
            <i class="bi bi-box-arrow-up-right"></i> SigmaHQ
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-muted small" href="https://github.com/ronibiju/e8-detection-lab" target="_blank">
            <i class="bi bi-github"></i> GitHub
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-4 border-top border-secondary mt-5 small">
  <span>Essential Eight Detection Lab</span>
  <span class="mx-2">·</span>
  <span>Built by <a href="https://ronibiju.com" class="text-decoration-none fw-semibold" style="color:#388bfd;" target="_blank">Roni Biju</a></span>
  <span class="mx-2">·</span>
  <span>Rules released under <a href="https://github.com/SigmaHQ/Detection-Rule-License" class="text-muted" target="_blank">DRL 1.1</a></span>
  <span class="mx-2">·</span>
  <span>Mapped to <a href="https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight" class="text-muted" target="_blank">ASD Essential Eight</a></span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script>hljs.highlightAll();</script>
{% block scripts %}{% endblock %}
</body>
</html>
